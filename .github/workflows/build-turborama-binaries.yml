name: Publish TurboRama Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-2022

    steps:
      - name: Checkout repository with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        shell: powershell
        run: |
          git lfs install
          git lfs pull

      - name: Validate TurboRama.7z
        shell: powershell
        run: |
          if (!(Test-Path "TurboRama.7z")) {
            Write-Host "ERROR: TurboRama.7z nao encontrado"
            exit 1
          }

          $size = (Get-Item "TurboRama.7z").Length
          Write-Host "TurboRama.7z tamanho: $size bytes"

          if ($size -lt 100000) {
            Write-Host "ERROR: TurboRama.7z parece estar vazio ou veio como ponteiro do Git LFS"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurboRama
          path: TurboRama.7z

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-master
          name: TurboRama Binarios
          files: TurboRama.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
